name: Build Flutter Android app

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_web/**'
      - '.github/workflows/flutter-android-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android host project
        run: flutter create --platforms=android .

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: minebot-web-android-apk
          path: flutter_web/build/app/outputs/flutter-apk/app-release.apk
