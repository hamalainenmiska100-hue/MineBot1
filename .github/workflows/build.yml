name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ios-build:
    name: iOS Build
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project MineBot.xcodeproj \
            -scheme MineBot \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            build
