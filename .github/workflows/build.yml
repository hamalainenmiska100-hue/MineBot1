name: Build MineBot IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: |
          pwd
          ls -la
          xcodebuild -version

      - name: Compile app binary
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          FILES=$(find . -maxdepth 1 -name '*.swift' ! -name 'Package.swift' ! -name 'main.swift' -print | sort)
          echo "$FILES"

          xcrun swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK" \
            -framework SwiftUI \
            -framework UIKit \
            -parse-as-library \
            $FILES \
            -o MineBot

          chmod +x MineBot
          file MineBot || true

      - name: Create app bundle
        run: |
          mkdir -p Payload/MineBot.app
          cp MineBot Payload/MineBot.app/
          cp Info.plist Payload/MineBot.app/
          ls -la Payload/MineBot.app

      - name: Package IPA
        run: |
          /usr/bin/zip -r MineBot.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: MineBot-IPA
          path: MineBot.ipa
